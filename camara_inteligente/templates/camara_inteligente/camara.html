<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara Inteligente - DysPlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { display: none; }

        /* Animación para el escáner de la cámara */
        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
        .scanner-line {
            animation: scan 2s linear infinite;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgBase: '#FDFBF7',
                        textMain: '#2D3748',
                        primary: '#4299E1',
                        success: '#48BB78',
                        reward: '#ED8936',
                        error: '#FC8181'
                    },
                    boxShadow: {
                        'soft': '0px 8px 16px rgba(45, 55, 72, 0.08)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgBase text-textMain min-h-screen flex flex-col items-center relative overflow-x-hidden">

    <!-- HEADER GLOBAL -->
    <header id="global-header" class="w-full flex items-center justify-between p-6 md:p-8 max-w-5xl z-50 relative">
        <a href="{% url 'home' %}" class="flex items-center gap-4 bg-white px-6 py-4 rounded-full shadow-soft hover:bg-gray-50 active:bg-gray-100 min-h-[64px] transition-all">
            <i data-lucide="arrow-left" class="w-8 h-8 text-primary"></i>
            <span class="text-[20px] font-bold">Volver</span>
        </a>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="w-full max-w-5xl px-6 md:px-8 flex-grow flex flex-col items-center justify-center pb-16 relative">

        <!-- ============================================== -->
        <!-- PASO 1: VISOR DE LA CÁMARA                       -->
        <!-- ============================================== -->
        <section id="view-camera" class="flex flex-col items-center w-full max-w-3xl animate-fade-in">

            <div class="w-full flex flex-col items-center">

                <!-- Título -->
                <h1 class="text-[32px] md:text-[36px] font-bold text-primary mb-8 text-center flex items-center gap-4 drop-shadow-sm">
                    <i data-lucide="camera" class="w-10 h-10"></i>
                    Cámara Inteligente
                </h1>

                <!-- Recuadro simulando cámara -->
                <div class="relative w-full max-w-2xl h-[400px] md:h-[480px] bg-gray-100 rounded-[40px] overflow-hidden border-8 border-white shadow-soft relative group">

                    <!-- Imagen de fondo simulada de la cámara (borrosa para simular enfoque) -->
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1550592704-6c76defa9985?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80')] bg-cover bg-center opacity-40 blur-sm group-hover:blur-0 transition-all duration-1000"></div>

                    <!-- Capa superior del visor -->
                    <div class="absolute inset-0 flex flex-col justify-between p-6 md:p-10 z-10">

                        <!-- Texto de Instrucción -->
                        <h2 class="text-[24px] md:text-[28px] font-bold text-center text-textMain bg-white/90 backdrop-blur-sm rounded-full py-3 px-8 self-center shadow-lg">
                            Apúntame a un objeto
                        </h2>

                        <!-- Mira / Retícula -->
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div class="w-48 h-48 md:w-64 md:h-64 border-4 border-dashed border-primary rounded-[32px] relative">
                                <!-- Línea de escaneo simulada -->
                                <div class="absolute left-0 right-0 h-1 bg-success shadow-[0_0_15px_#48BB78] scanner-line"></div>
                            </div>
                        </div>

                        <!-- Botón Capturar -->
                        <button onclick="captureObject()" class="w-24 h-24 bg-white/80 backdrop-blur-sm rounded-full self-center flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 transition-transform border-4 border-white group/btn">
                            <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center group-hover/btn:bg-blue-500 transition-colors shadow-inner">
                                <i data-lucide="focus" class="w-10 h-10 text-white"></i>
                            </div>
                        </button>
                    </div>
                </div>

            </div>
        </section>


        <!-- ============================================== -->
        <!-- PASO 2: ANALIZANDO EL OBJETO (IA VISUAL)         -->
        <!-- ============================================== -->
        <section id="view-analyzing-obj" class="hidden flex-col items-center justify-center w-full max-w-2xl animate-fade-in text-center mt-10">
            <div class="relative w-48 h-48 mb-10">
                <div class="absolute inset-0 border-[12px] border-white rounded-full shadow-soft opacity-50"></div>
                <div class="absolute inset-0 border-[12px] border-primary border-t-transparent border-b-transparent rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center bg-white/80 rounded-full m-2">
                    <i data-lucide="scan-line" class="w-20 h-20 text-primary animate-pulse"></i>
                </div>
            </div>
            <h2 class="text-[36px] font-bold text-primary animate-pulse tracking-wide">Analizando objeto...</h2>
            <p class="text-[20px] text-gray-500 mt-4">Nuestra IA está trabajando mágicamente ✨</p>
        </section>


        <!-- ============================================== -->
        <!-- PASO 3: EJERCICIO GENERADO (ENFOQUE ÚNICO)       -->
        <!-- ============================================== -->
        <section id="view-exercise" class="hidden flex-col items-center justify-center w-full max-w-4xl animate-fade-in mt-6">
            <div class="bg-white rounded-[40px] p-12 md:p-16 shadow-soft w-full flex flex-col items-center text-center border-4 border-success/20">

                <!-- Mensaje de éxito de la IA -->
                <div class="flex flex-col items-center mb-8 relative">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-success/10 rounded-full blur-2xl"></div>
                    <div class="w-20 h-20 bg-success/20 rounded-full flex items-center justify-center text-success mb-4 shadow-sm border-2 border-success/30">
                        <i data-lucide="pencil" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-[32px] md:text-[36px] font-bold text-success drop-shadow-sm">¡Encontré un Lápiz!</h2>
                </div>

                <h3 class="text-[24px] font-semibold text-gray-400 mb-10">Ahora lee en voz alta:</h3>

                <!-- Frase Generada -->
                <div class="mb-16">
                    <p class="text-[40px] md:text-[56px] font-bold text-textMain leading-[1.4] tracking-wide">
                        El <span class="text-primary">lápiz</span> es <span class="text-reward">amarillo</span>.
                    </p>
                </div>

                <!-- Controles -->
                <div class="flex flex-col sm:flex-row items-center justify-center gap-8 w-full">

                    <button class="w-full sm:w-auto bg-primary/10 text-primary border-4 border-primary rounded-full px-8 py-5 font-bold text-[24px] hover:bg-primary hover:text-white transition-colors flex items-center justify-center gap-4">
                        <i data-lucide="volume-2" class="w-8 h-8"></i> Escuchar
                    </button>

                    <button id="btn-grabar" onclick="startRecording()" class="w-full sm:w-auto bg-white text-error border-4 border-error rounded-full px-8 py-5 font-bold text-[24px] hover:bg-error hover:text-white transition-colors shadow-soft flex items-center justify-center gap-4 group relative">
                        <i id="icon-mic" data-lucide="mic" class="w-8 h-8 relative z-10"></i>
                        <span id="text-grabar" class="relative z-10">Grabar</span>
                    </button>

                </div>
            </div>
        </section>


        <!-- ============================================== -->
        <!-- PASO 4A: ANALIZANDO PRONUNCIACIÓN (IA VOZ)       -->
        <!-- ============================================== -->
        <section id="view-analyzing-voice" class="hidden flex-col items-center justify-center w-full max-w-2xl animate-fade-in text-center mt-20">
            <div class="relative w-40 h-40 mb-10">
                <div class="absolute inset-0 border-[12px] border-white rounded-full shadow-soft opacity-50"></div>
                <div class="absolute inset-0 border-[12px] border-error border-t-transparent rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center bg-white/80 rounded-full m-2">
                    <i data-lucide="mic" class="w-16 h-16 text-error animate-pulse"></i>
                </div>
            </div>
            <h2 class="text-[36px] font-bold text-error animate-pulse tracking-wide">Analizando pronunciación...</h2>
        </section>


        <!-- ============================================== -->
        <!-- PASO 4B: VISTA DE RESULTADO FINAL                -->
        <!-- ============================================== -->
        <section id="view-result" class="hidden flex-col items-center w-full max-w-3xl animate-fade-in mt-4">

            <div class="absolute inset-0 overflow-hidden pointer-events-none flex justify-around opacity-80 text-4xl">
                <div class="animate-[bounce_2s_ease-in-out_infinite_0.1s]">⭐</div>
                <div class="animate-[bounce_2.5s_ease-in-out_infinite_0.5s]">🌟</div>
                <div class="animate-[bounce_3s_ease-in-out_infinite_0.2s]">🪙</div>
                <div class="animate-[bounce_2.2s_ease-in-out_infinite_0.8s]">✨</div>
            </div>

            <div class="bg-white rounded-[40px] p-12 md:p-16 shadow-soft w-full flex flex-col items-center text-center border-4 border-success/20 mb-8 relative z-10">

                <h2 class="text-[40px] md:text-[48px] font-bold text-success mb-2 drop-shadow-sm">¡Increíble!</h2>
                <p class="text-[24px] text-gray-600 mb-10">Leíste correctamente el objeto.</p>

                <!-- Círculo de Puntuación -->
                <div class="relative w-48 h-48 mb-8 flex items-center justify-center">
                    <div class="absolute inset-0 rounded-full" style="background: conic-gradient(#48BB78 98%, #edf2f7 0);"></div>
                    <div class="absolute inset-4 bg-white rounded-full flex flex-col items-center justify-center shadow-inner">
                        <span class="text-[48px] font-bold text-success leading-none">98%</span>
                        <span class="text-[16px] text-gray-500 font-bold uppercase tracking-widest mt-1">Precisión</span>
                    </div>
                </div>

                <!-- Recompensa en Monedas -->
                <div class="bg-reward/10 rounded-full px-8 py-4 flex items-center gap-3 border-2 border-reward/20 mb-10">
                    <i data-lucide="coins" class="w-8 h-8 text-reward"></i>
                    <span class="text-[24px] font-bold text-reward">+ 15 Monedas</span>
                </div>

                <!-- Botones de Acción Final -->
                <div class="flex flex-col md:flex-row gap-6 w-full max-w-lg justify-center">

                    <button onclick="goToMenu()" class="w-full bg-white text-textMain px-8 py-5 rounded-full font-bold text-[20px] shadow-[0_6px_0_#e2e8f0] border-4 border-gray-100 hover:-translate-y-1 hover:shadow-[0_8px_0_#e2e8f0] active:translate-y-2 active:shadow-none transition-all flex items-center justify-center gap-3">
                        <i data-lucide="home" class="w-6 h-6"></i> Salir al menú
                    </button>

                    <button onclick="resetCamera()" class="w-full bg-primary text-white px-8 py-5 rounded-full font-bold text-[20px] shadow-[0_6px_0_#2b6cb0] border-4 border-transparent hover:-translate-y-1 hover:shadow-[0_8px_0_#2b6cb0] active:translate-y-2 active:shadow-none transition-all flex items-center justify-center gap-3">
                        Nuevo objeto <i data-lucide="camera" class="w-6 h-6"></i>
                    </button>

                </div>
            </div>
        </section>

    </main>

    <script>
        lucide.createIcons();

        function changeView(hideId, showId) {
            document.getElementById(hideId).classList.add('hidden');
            document.getElementById(hideId).classList.remove('flex');

            document.getElementById(showId).classList.remove('hidden');
            document.getElementById(showId).classList.add('flex');

            lucide.createIcons();
        }

        // Paso 1 al 2 al 3 (Visor -> Análisis Visual -> Ejercicio)
        function captureObject() {
            document.getElementById('global-header').classList.add('hidden');
            document.getElementById('global-header').classList.remove('flex');

            changeView('view-camera', 'view-analyzing-obj');

            // Simula tiempo de análisis del objeto (IA Visual)
            setTimeout(() => {
                changeView('view-analyzing-obj', 'view-exercise');
            }, 2000);
        }

        // Paso 3 al 4 (Ejercicio -> Grabación -> Resultado)
        function startRecording() {
            const btnGrabar = document.getElementById('btn-grabar');
            const textGrabar = document.getElementById('text-grabar');

            // Simular grabación de voz
            btnGrabar.classList.remove('bg-white', 'text-error');
            btnGrabar.classList.add('bg-error', 'text-white', 'animate-pulse');
            textGrabar.textContent = "Grabando...";

            setTimeout(() => {
                // Termina de grabar, evalúa pronunciación
                changeView('view-exercise', 'view-analyzing-voice');

                // Simula 1 segundo de evaluación solicitado en el prompt
                setTimeout(() => {
                    changeView('view-analyzing-voice', 'view-result');
                }, 1000);

            }, 2000); // 2 segundos leyendo
        }

        function goToMenu() {
            window.location.href = "{% url 'home' %}";
        }

        function resetCamera() {
            // Restaurar estado original
            document.getElementById('global-header').classList.remove('hidden');
            document.getElementById('global-header').classList.add('flex');

            const btnGrabar = document.getElementById('btn-grabar');
            const textGrabar = document.getElementById('text-grabar');
            btnGrabar.classList.remove('bg-error', 'text-white', 'animate-pulse');
            btnGrabar.classList.add('bg-white', 'text-error');
            textGrabar.textContent = "Grabar";

            changeView('view-result', 'view-camera');
        }
    </script>
</body>
</html>
