<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prototipo — Mapa DysPlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1030;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 40px;
      font-family: 'Nunito', Arial, sans-serif;
      min-height: 100vh;
    }

    h1 {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* ── Viewport (scrollable phone-width container) ── */
    .viewport {
      width: 390px;
      height: 82vh;
      overflow-y: scroll;
      overflow-x: hidden;
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.7), 0 0 0 8px #2a2040;
    }
    .viewport::-webkit-scrollbar { display: none; }

    /* ── Canvas: fixed dimensions, illustrated background ── */
    .canvas {
      position: relative;
      width: 390px;
      height: 1150px;
      overflow: hidden;
      /* Single gradient background — warm at bottom (start), cool at top (final levels) */
      background:
        radial-gradient(ellipse 220px 160px at 340px 200px, rgba(255,255,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 300px 200px at 60px  650px, rgba(255,255,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 260px 180px at 350px 900px, rgba(255,180,100,0.18) 0%, transparent 70%),
        linear-gradient(to bottom,
          #6eb5c0  0%,
          #8ecf8e 12%,
          #b8de70 25%,
          #e2e060 38%,
          #f2c848 50%,
          #f5a858 62%,
          #f08878 74%,
          #ec78a8 86%,
          #e868c0 100%
        );
    }

    /* ── SVG sits at z-index 1 (above bg, below decorations) ── */
    .canvas > svg.rope-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Background decoration chars ── */
    .bg-deco {
      position: absolute;
      pointer-events: none;
      z-index: 2;
      opacity: 0.5;
      font-size: 48px;
      line-height: 1;
    }

    /* ── Stars scattered along the rope ── */
    .star {
      position: absolute;
      pointer-events: none;
      z-index: 6;
      font-size: 16px;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35));
    }

    /* ── Zone ribbon (bottom center) ── */
    .zona-ribbon {
      position: absolute;
      z-index: 8;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Nunito', Arial, sans-serif;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 2px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      white-space: nowrap;
      padding: 6px 56px;
      /* Candy Crush ribbon shape: fades at both ends */
      background: linear-gradient(90deg,
        transparent  0%,
        #c0378a     16%,
        #d9449e     50%,
        #c0378a     84%,
        transparent 100%
      );
    }
    /* Small arrow-folds at each end */
    .zona-ribbon::before,
    .zona-ribbon::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 12px;
      background: #8f245f;
    }
    .zona-ribbon::before { left: -6px; clip-path: polygon(100% 0, 100% 100%, 0 50%); }
    .zona-ribbon::after  { right: -6px; clip-path: polygon(0 0, 0 100%, 100% 50%); }

    /* ── Level node base ── */
    .lvl {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      /* anchor = circle center */
      transform: translate(-50%, -50%);
      border: 5px solid white;
      font-family: 'Nunito', Arial, sans-serif;
      font-weight: 900;
      color: white;
      z-index: 20;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      user-select: none;
    }

    /* Completed */
    .lvl--done {
      width: 74px; height: 74px;
      font-size: 22px;
      background: linear-gradient(155deg, #5dde88 0%, #22a855 100%);
      box-shadow: 0 7px 0 #157a3a, 0 10px 22px rgba(0,0,0,0.28);
    }
    .lvl--done:hover {
      transform: translate(-50%, -50%) translateY(-4px);
      box-shadow: 0 11px 0 #157a3a, 0 14px 28px rgba(0,0,0,0.32);
    }
    /* Badge ⭐ on completed */
    .lvl--done .badge {
      position: absolute;
      top: -8px; right: -8px;
      width: 26px; height: 26px;
      background: #f5c518;
      border: 3px solid white;
      border-radius: 50%;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Current / Active */
    .lvl--active {
      width: 88px; height: 88px;
      font-size: 30px;
      background: linear-gradient(155deg, #7ec8fb 0%, #2075d8 100%);
      box-shadow: 0 8px 0 #145199, 0 12px 28px rgba(0,0,0,0.32);
      animation: nodeBounce 1.25s ease-in-out infinite;
    }
    @keyframes nodeBounce {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px);  }
      50%       { transform: translate(-50%, -50%) translateY(-9px); }
    }

    /* Locked */
    .lvl--locked {
      width: 66px; height: 66px;
      font-size: 26px;
      background: linear-gradient(155deg, #b0bec5 0%, #78909c 100%);
      box-shadow: 0 5px 0 #445b65, 0 8px 18px rgba(0,0,0,0.22);
      cursor: not-allowed;
      opacity: 0.88;
    }

    /* "¡Toca para jugar!" bubble above active level */
    .play-bubble {
      position: absolute;
      z-index: 25;
      transform: translateX(-50%);
      background: white;
      color: #2075d8;
      font-family: 'Nunito', Arial, sans-serif;
      font-weight: 800;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 24px;
      white-space: nowrap;
      box-shadow: 0 3px 10px rgba(0,0,0,0.22);
      animation: bubblePulse 1.25s ease-in-out infinite;
    }
    .play-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: white;
      border-bottom: none;
    }
    @keyframes bubblePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }

    /* Avatar/character on active level */
    .avatar-pin {
      position: absolute;
      z-index: 22;
      font-size: 32px;
      transform: translate(-50%, -100%);
      margin-top: -8px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      animation: nodeBounce 1.25s ease-in-out infinite;
    }
  </style>
</head>
<body>

<h1>PROTOTIPO · MAPA DE NIVELES</h1>

<div class="viewport">
<div class="canvas">

  <!-- ════════════════════════════════════

  <span class="bg-deco" style="right:12px; top:310px; font-size:36px">🦋</span>

       Puntos (de abajo↑ hacia arriba):

         → Nv3 (65,840) → Nv4 (175,750)

  <svg class="rope-layer" viewBox="0 0 390 1150" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.30)"/>
      </filter>
    </defs>

    <!-- Cuerda base: trazo sólido rosado -->
    <polyline
      points="295,1040 130,950 65,840 175,750 310,665 330,558 195,470 65,382 135,278 300,192"
      fill="none"
      stroke="#e87ab8"
      stroke-width="26"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#shadow)"/>

    <!-- Overlay de guiones blancos: efecto cuerda trenzada -->
    <polyline
      points="295,1040 130,950 65,840 175,750 310,665 330,558 195,470 65,382 135,278 300,192"
      fill="none"
      stroke="white"
      stroke-width="26"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-dasharray="17 17"
      opacity="0.42"/>
  </svg>

  <!-- ════════════════════════════════════

  ══════════════════════════════════════ -->
  <span class="star" style="left:212px; top:995px">⭐</span>
  <span class="star" style="left:97px;  top:895px">🌟</span>
  <span class="star" style="left:120px; top:795px">⭐</span>
  <span class="star" style="left:242px; top:707px">🌟</span>
  <span class="star" style="left:320px; top:611px">⭐</span>
  <span class="star" style="left:262px; top:514px">🌟</span>
  <span class="star" style="left:130px; top:426px">⭐</span>
  <span class="star" style="left:100px; top:330px">🌟</span>
  <span class="star" style="left:217px; top:235px">⭐</span>

  <!-- ════════════════════════════════════
       Nodos de nivel
  ══════════════════════════════════════ -->

  <!-- Nivel 1 — completado -->
  <div class="lvl lvl--done" style="left:295px; top:1040px" title="Nivel 1 — completado">
    <span class="badge">⭐</span>
    1
  </div>

  <!-- Nivel 2 — completado -->
  <div class="lvl lvl--done" style="left:130px; top:950px" title="Nivel 2 — completado">

  <!-- Nivel 3 — completado -->
  <div class="lvl lvl--done" style="left:65px; top:840px" title="Nivel 3 — completado">

    3
  </div>

  <!-- Nivel 4 — ACTUAL (con avatar y burbuja) -->
  <span class="avatar-pin" style="left:175px; top:750px">🦊</span>
  <div class="play-bubble" style="left:175px; top:695px">¡Toca para jugar!</div>
  <div class="lvl lvl--active" style="left:175px; top:750px" title="Nivel 4 — tu nivel actual">
    4

  <!-- Nivel 5 — bloqueado -->
  <div class="lvl lvl--locked" style="left:310px; top:665px" title="Nivel 5 — bloqueado">
    🔒
  </div>

  <!-- Nivel 6 — bloqueado -->

    🔒

  <!-- Nivel 7 — bloqueado -->

    🔒
  </div>

  <!-- Nivel 8 — bloqueado -->
  <div class="lvl lvl--locked" style="left:65px; top:382px" title="Nivel 8 — bloqueado">
    🔒
  </div>

  <!-- Nivel 9 — bloqueado -->
  <div class="lvl lvl--locked" style="left:135px; top:278px" title="Nivel 9 — bloqueado">
    🔒
  </div>

  <!-- Nivel 10 — bloqueado -->
  <div class="lvl lvl--locked" style="left:300px; top:192px" title="Nivel 10 — bloqueado">
    🔒

  <!-- ════════════════════════════════════
       Ribbon de zona
  ══════════════════════════════════════ -->

</div><!-- .canvas -->

</body>
</html>
