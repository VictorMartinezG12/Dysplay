<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DysPlay 🦁{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Font: Nunito (especificada para el proyecto) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dysPlayVerde: '#10B981',
                        dysPlayAzul: '#3B82F6',
                        dysPlayFondo: '#FFFBEB',
                        dysPlayTexto: '#1E293B',
                        primary: '#3B82F6',
                        secondary: '#C2410C',
                        success: '#10B981',
                        reward: '#C2410C',
                        error: '#EF4444'
                    },
                    fontFamily: {
                        dislexia: ['Nunito', 'Comic Sans MS', 'Verdana', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0px 8px 24px rgba(30, 41, 59, 0.06)',
                        'hard': '0px 8px 0px rgba(30, 41, 59, 0.12)',
                        'game': '0px 10px 0px #CBD5E0',
                        'game-primary': '0px 10px 0px #1D4ED8',
                        'game-success': '0px 10px 0px #047857',
                        'game-warning': '0px 10px 0px #9A3412',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Nunito', 'Comic Sans MS', 'Verdana', sans-serif;
            background-color: #FFFBEB;
            letter-spacing: 0.06em;
            line-height: 1.6;
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="text-dysPlayTexto font-dislexia antialiased min-h-screen flex flex-col selection:bg-orange-200">

    {% block navbar %}
    {% if user.is_authenticated %}
    <!-- Navbar infantil mágica y divertida -->
    <nav class="bg-white border-b-4 border-purple-100 shadow-soft py-4 px-6 sticky top-0 z-50 animate-fade-in">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="{% url 'landing' %}" class="flex items-center gap-3 group">
                <span class="text-3xl group-hover:scale-120 transition-transform duration-300">🦁</span>
                <span class="text-2xl font-black bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent tracking-wide">DysPlay</span>
            </a>
            
            <div class="flex items-center gap-3 md:gap-6">
                <!-- Monedas -->
                <div class="flex items-center gap-2 bg-amber-50 border-2 border-amber-200 px-4 py-2 rounded-full text-amber-700 font-extrabold text-sm md:text-base shadow-sm">
                    <span class="text-lg">🪙</span>
                    <span>{{ user.monedas }}</span>
                </div>
                
                <!-- Racha -->
                <div class="flex items-center gap-2 bg-orange-50 border-2 border-orange-200 px-4 py-2 rounded-full text-orange-700 font-extrabold text-sm md:text-base shadow-sm">
                    <span class="text-lg">🔥</span>
                    <span>{{ user.racha_dias }} días</span>
                </div>

                <!-- Cerrar Sesión -->
                <a href="/accounts/logout/" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2.5 px-4 rounded-2xl text-sm transition-all duration-200 flex items-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Cerrar Sesión</span>
                </a>
            </div>
        </div>
    </nav>
    {% endif %}
    {% endblock %}

    {% block layout %}
    <!-- Layout por defecto: Centrado para pantallas de login/registro o páginas simples -->
    <main class="flex-grow flex items-center justify-center p-4">
        {% block content %}
        {% endblock %}
    </main>
    {% endblock %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
