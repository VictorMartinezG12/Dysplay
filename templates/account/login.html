{% extends "base.html" %}
{% load socialaccount %}

{% block title %}¡Entrar a DysPlay!🎮{% endblock %}

{% block content %}
<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border-2 border-gray-100 transform transition duration-500 hover:scale-[1.01]">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800 tracking-wide">🎮 ¡Entrar a DysPlay!</h1>
        <p class="text-gray-500 mt-2 text-sm">¡Tu aventura de aprendizaje está por comenzar!</p>
    </div>

    <div class="space-y-3">
        <a href="{% provider_login_url 'google' %}" class="flex items-center justify-center w-full bg-[#4285F4] hover:bg-[#357ae8] text-white font-bold py-3 px-4 rounded-2xl shadow-md transition-all transform active:scale-95 text-base">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-6 h-6 mr-3 bg-white p-0.5 rounded-full">
            Entrar con Google
        </a>

        <a href="{% provider_login_url 'microsoft' %}" class="flex items-center justify-center w-full bg-[#00a4ef] hover:bg-[#008ccb] text-white font-bold py-3 px-4 rounded-2xl shadow-md transition-all transform active:scale-95 text-base">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Microsoft_logo.png" alt="Microsoft" class="w-6 h-6 mr-3 bg-white p-0.5 rounded-full">
            Entrar con Microsoft
        </a>
    </div>

    <div class="flex items-center my-6 text-gray-400 text-sm font-semibold">
        <div class="flex-1 border-t-2 border-gray-100"></div>
        <span class="px-3">O usa tu correo</span>
        <div class="flex-1 border-t-2 border-gray-100"></div>
    </div>

    <form method="POST" action="{% url 'account_login' %}" class="space-y-5">
        {% csrf_token %}

        <div class="flex flex-col text-left">
            <label for="id_login" class="font-bold text-gray-700 mb-2 block text-sm tracking-wide">✉️ Tu Correo Electrónico:</label>
            <input type="email" name="login" placeholder="ejemplo@correo.com" required id="id_login"
                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-2xl text-base focus:outline-none focus:border-dysPlayVerde transition-colors bg-gray-50 focus:bg-white font-sans">
        </div>

        <div class="flex flex-col text-left">
            <label for="id_password" class="font-bold text-gray-700 mb-2 block text-sm tracking-wide">🔑 Tu Contraseña:</label>
            <input type="password" name="password" placeholder="Escribe tu contraseña" required id="id_password"
                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-2xl text-base focus:outline-none focus:border-dysPlayVerde transition-colors bg-gray-50 focus:bg-white">
        </div>

        <button type="submit" class="w-full bg-dysPlayVerde hover:bg-green-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg transition-all transform active:scale-[0.98] text-lg tracking-wider mt-2">
            ¡A Jugar! 🚀
        </button>
    </form>
</div>
{% endblock %}
