{% extends 'panel_admin/base_panel.html' %}

{% block title %}Eliminar - Panel - DysPlay{% endblock %}

{% block panel_content %}
<div class="bg-white rounded-2xl shadow-soft border-2 border-red-200 p-8 max-w-lg">
    <h1 class="text-xl font-black text-red-700 mb-3">¿Eliminar este registro?</h1>
    <p class="text-gray-600 mb-6">{{ object }}</p>
    <p class="text-sm text-gray-400 mb-6">Esta acción no se puede deshacer.</p>
    <form method="post" class="flex items-center gap-3">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 px-6 rounded-xl text-sm transition-colors">
            Sí, eliminar
        </button>
        <a href="{% url 'panel_admin:lista' recurso.slug %}" class="text-gray-500 font-bold text-sm hover:underline">Cancelar</a>
    </form>
</div>
{% endblock %}
