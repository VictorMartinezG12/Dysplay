{% extends 'base.html' %}
{% load static %}

{% block title %}Personalizar mi Avatar - DysPlay{% endblock %}

{% block content %}
<div class="max-w-6xl w-full">
    {% include 'avatar/_armario_contenido.html' %}

    <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-md mx-auto">
        <a href="{% url 'avatar:casa' %}" class="w-full flex items-center justify-center gap-3 bg-orange-500 text-white py-4 rounded-2xl font-black text-xl shadow-hard hover:scale-105 active:scale-95 transition-transform">
            <i data-lucide="home" class="w-6 h-6" aria-hidden="true"></i>
            Mi Casa 🏠
        </a>

        <a href="{% url 'home' %}" class="w-full flex items-center justify-center gap-3 bg-success text-white py-4 rounded-2xl font-black text-xl shadow-hard hover:scale-105 active:scale-95 transition-transform">
            <i data-lucide="check-circle" class="w-6 h-6" aria-hidden="true"></i>
            ¡Todo listo!
        </a>
    </div>
</div>

<!-- Configuración para armario.js cuando se accede directo por esta URL
     (sin casa.js cargado, a diferencia del modal de armario dentro de casa.html) -->
<script type="application/json" id="armario-config-data">
{
    "urlEquiparItem": "{% url 'avatar:equipar_item' %}",
    "urlComprarYEquipar": "{% url 'avatar:comprar_y_equipar' %}",
    "urlDesequiparItem": "{% url 'avatar:desequipar_item' %}",
    "csrfToken": "{{ csrf_token }}"
}
</script>
<script src="{% static 'js/avatar/armario.js' %}" defer></script>
{% endblock %}
