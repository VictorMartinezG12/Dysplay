{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizar Avatar - DysPlay</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --global-font-family: {% if config_global.tipo_fuente == 'OpenDyslexic' %}'OpenDyslexic', sans-serif{% elif config_global.tipo_fuente == 'Lexend' %}'Lexend', sans-serif{% elif config_global.tipo_fuente == 'Arial' %}'Arial', sans-serif{% elif config_global.tipo_fuente == 'Verdana' %}'Verdana', sans-serif{% else %}'Nunito', sans-serif{% endif %};
            --global-font-size: {% if config_global.tamano_fuente == 'pequeno' %}0.875rem{% elif config_global.tamano_fuente == 'grande' %}1.25rem{% elif config_global.tamano_fuente == 'extra-grande' %}1.5rem{% else %}1rem{% endif %};
            --global-letter-spacing: {% if config_global.espaciado_letras == 'medio' %}0.1em{% elif config_global.espaciado_letras == 'amplio' %}0.2em{% else %}normal{% endif %};
            --global-word-spacing: {% if config_global.espaciado_palabras == 'medio' %}0.2em{% elif config_global.espaciado_palabras == 'amplio' %}0.4em{% else %}normal{% endif %};
            {% if config_global.tema_visual == 'oscuro' %}
                --color-fondo: #1E293B;
                --color-texto: #F8FAFC;
                --color-primario: #3B82F6;
            {% elif config_global.tema_visual == 'infantil-verde' %}
                --color-fondo: #F0FDF4;
                --color-texto: #166534;
                --color-primario: #22C55E;
            {% elif config_global.tema_visual == 'infantil-azul' %}
                --color-fondo: #EFF6FF;
                --color-texto: #1E40AF;
                --color-primario: #3B82F6;
            {% else %}
                --color-fondo: #FFFBEB;
                --color-texto: #1E293B;
                --color-primario: #3B82F6;
            {% endif %}
        }

        body {
            font-family: var(--global-font-family);
            letter-spacing: var(--global-letter-spacing);
            word-spacing: var(--global-word-spacing);
            line-height: 1.6;
            background-color: var(--color-fondo);
            color: var(--color-texto);
        }

        /* Ocultar barra de scroll en navegadores webkit pero permitir el scroll funcional */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-bgBase text-textMain min-h-screen pb-16 flex flex-col items-center">

    <!-- COMPONENTE: HEADER (Saldo y Navegación) -->
    <header class="w-full flex items-center justify-between p-6 md:p-8 max-w-5xl">
        <!-- Botón Volver (Cumple regla de 60x60 mínimo) -->
        <a href="{% url 'home' %}" class="flex items-center gap-4 bg-white px-6 py-4 rounded-full shadow-soft hover:bg-gray-50 active:bg-gray-100 min-h-[64px] transition-all focus:outline-none focus:ring-4 focus:ring-primary">
            <i data-lucide="arrow-left" class="w-8 h-8 text-primary"></i>
            <span class="text-[20px] font-bold">Volver</span>
        </a>

        <!-- Indicador de Saldo -->
        <div class="flex items-center gap-4 bg-white px-8 py-4 rounded-full shadow-soft min-h-[64px]">
            <i data-lucide="coins" class="w-8 h-8 text-reward"></i>
            <span class="text-[24px] font-bold text-reward">150 Monedas</span>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="w-full max-w-5xl px-6 md:px-8 flex flex-col gap-12 mt-4">

        <!-- COMPONENTE: VISTA PREVIA DEL AVATAR -->
        <!-- Usa espacios amplios (p-10) y borde suave -->
        <section class="w-full bg-white rounded-2xl p-10 shadow-soft flex flex-col items-center justify-center min-h-[320px] relative">

            <h2 class="text-[32px] font-bold text-primary mb-8 flex items-center gap-4">
                <i data-lucide="user" class="w-10 h-10"></i>
                Tu Avatar
            </h2>

            <!-- Personaje / Avatar Mock -->
            <div class="w-56 h-56 bg-primary/10 rounded-full border-8 border-primary/20 flex items-center justify-center relative shadow-sm animate-[bounce_4s_ease-in-out_infinite]">
                 <!-- Cara Base -->
                 <i data-lucide="smile" class="w-32 h-32 text-primary"></i>

                 <!-- Accesorio Equipado (Ejemplo visual) -->
                 <div class="absolute -top-4 -right-4 w-20 h-20 bg-reward rounded-full border-4 border-white flex items-center justify-center shadow-md">
                     <i data-lucide="crown" class="w-10 h-10 text-white"></i>
                 </div>
            </div>

            <!-- Botón opcional para guardar -->
            <button class="absolute bottom-8 right-8 bg-success text-white px-8 py-4 rounded-full font-bold text-[20px] shadow-soft hover:scale-105 active:scale-95 transition-transform flex items-center gap-3">
                <i data-lucide="check-circle-2" class="w-6 h-6"></i>
                Guardar
            </button>
        </section>

        <!-- COMPONENTE: SISTEMA DE PESTAÑAS (TABS) -->
        <section class="w-full">

            <!-- Menú de Categorías -->
            <nav class="flex overflow-x-auto gap-4 pb-6 scrollbar-hide">
                <!-- Pestaña Activa (Color principal) -->
                <button class="flex items-center gap-3 px-8 py-4 bg-primary text-white rounded-full font-bold text-[20px] shadow-soft flex-shrink-0 min-h-[64px] focus:outline-none focus:ring-4 focus:ring-primary/50">
                    <i data-lucide="smile" class="w-6 h-6"></i>
                    Cara
                </button>

                <!-- Pestañas Inactivas (Fondo blanco) -->
                <button class="flex items-center gap-3 px-8 py-4 bg-white text-textMain rounded-full font-bold text-[20px] shadow-soft flex-shrink-0 min-h-[64px] hover:bg-gray-50 active:bg-gray-100 transition-colors focus:outline-none focus:ring-4 focus:ring-primary/50">
                    <i data-lucide="scissors" class="w-6 h-6"></i>
                    Cabello
                </button>
                <button class="flex items-center gap-3 px-8 py-4 bg-white text-textMain rounded-full font-bold text-[20px] shadow-soft flex-shrink-0 min-h-[64px] hover:bg-gray-50 active:bg-gray-100 transition-colors focus:outline-none focus:ring-4 focus:ring-primary/50">
                    <i data-lucide="shirt" class="w-6 h-6"></i>
                    Ropa
                </button>
                <button class="flex items-center gap-3 px-8 py-4 bg-white text-textMain rounded-full font-bold text-[20px] shadow-soft flex-shrink-0 min-h-[64px] hover:bg-gray-50 active:bg-gray-100 transition-colors focus:outline-none focus:ring-4 focus:ring-primary/50">
                    <i data-lucide="glasses" class="w-6 h-6"></i>
                    Accesorios
                </button>
                <button class="flex items-center gap-3 px-8 py-4 bg-white text-textMain rounded-full font-bold text-[20px] shadow-soft flex-shrink-0 min-h-[64px] hover:bg-gray-50 active:bg-gray-100 transition-colors focus:outline-none focus:ring-4 focus:ring-primary/50">
                    <i data-lucide="image" class="w-6 h-6"></i>
                    Fondo
                </button>
            </nav>

            <!-- COMPONENTE: CUADRÍCULA DE ÍTEMS -->
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 lg:gap-8 mt-4">

                <!-- Ítem 1: Equipado (Actualmente en uso) -->
                <button class="bg-primary/10 border-4 border-primary rounded-2xl p-6 flex flex-col items-center gap-4 shadow-soft hover:-translate-y-2 transition-transform min-h-[160px] relative focus:outline-none focus:ring-4 focus:ring-primary/50">
                    <!-- Insignia de equipado -->
                    <div class="absolute top-4 right-4 bg-primary text-white rounded-full p-1.5 shadow-sm">
                        <i data-lucide="check" class="w-6 h-6"></i>
                    </div>

                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-primary shadow-sm">
                        <i data-lucide="smile" class="w-12 h-12"></i>
                    </div>
                    <span class="font-bold text-[20px] text-primary">Feliz</span>
                </button>

                <!-- Ítem 2: Desbloqueado (Disponible para equipar) -->
                <button class="bg-white border-4 border-transparent rounded-2xl p-6 flex flex-col items-center gap-4 shadow-soft hover:-translate-y-2 hover:border-gray-200 transition-all min-h-[160px] focus:outline-none focus:ring-4 focus:ring-primary/50">
                    <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center text-textMain shadow-sm">
                        <i data-lucide="glasses" class="w-12 h-12"></i>
                    </div>
                    <span class="font-bold text-[20px] text-textMain">Gafas</span>
                </button>

                <!-- Ítem 3: Bloqueado (Gris, con precio) -->
                <button class="bg-gray-50 border-4 border-transparent rounded-2xl p-6 flex flex-col items-center gap-4 shadow-soft opacity-75 hover:opacity-100 transition-opacity min-h-[160px] relative grayscale">
                    <!-- Insignia de Candado -->
                    <div class="absolute top-4 right-4 bg-gray-300 text-gray-700 rounded-full p-1.5 shadow-sm">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>

                    <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 shadow-sm">
                        <i data-lucide="crown" class="w-12 h-12"></i>
                    </div>
                    <span class="font-bold text-[20px] text-gray-600">Corona</span>

                    <!-- Etiqueta de Precio Ficticia -->
                    <span class="text-[16px] font-bold text-reward bg-white px-4 py-2 rounded-full flex items-center gap-2 shadow-sm absolute -bottom-4 border-2 border-gray-100">
                        <i data-lucide="coins" class="w-5 h-5"></i> 50
                    </span>
                </button>

                <!-- Ítem 4: Bloqueado (Gris, con precio) -->
                <button class="bg-gray-50 border-4 border-transparent rounded-2xl p-6 flex flex-col items-center gap-4 shadow-soft opacity-75 hover:opacity-100 transition-opacity min-h-[160px] relative grayscale">
                    <div class="absolute top-4 right-4 bg-gray-300 text-gray-700 rounded-full p-1.5 shadow-sm">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>

                    <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 shadow-sm">
                        <i data-lucide="star" class="w-12 h-12"></i>
                    </div>
                    <span class="font-bold text-[20px] text-gray-600">Estrella</span>

                    <span class="text-[16px] font-bold text-reward bg-white px-4 py-2 rounded-full flex items-center gap-2 shadow-sm absolute -bottom-4 border-2 border-gray-100">
                        <i data-lucide="coins" class="w-5 h-5"></i> 120
                    </span>
                </button>

            </div>
        </section>

    </main>

    <script>
        // Renderizar iconos
        lucide.createIcons();
    </script>
</body>
</html>
